command:
  - uvicorn
  - app:app
  - --host
  - 0.0.0.0
  - --port
  - "8000"

# Workspace-specific resources (warehouse, lakebase, secret scope) and the
# UC catalog/schema/volume identifiers are bound by the Databricks Asset
# Bundle (resources/app.yml) — NOT hardcoded here — so a fresh workspace
# deploys without editing this file.
#
# At runtime app.py reads:
#   - UC_CATALOG, UC_SCHEMA, VOLUME_NAME    — set by DAB secret bindings
#   - DATABRICKS_HOST                       — auto-set by the Apps runtime
#   - DATABRICKS_WAREHOUSE_ID               — set by DAB sql_warehouse binding
#   - HF_TOKEN                              — set by DAB secret binding
#   - DATABRICKS_CLIENT_ID/CLIENT_SECRET    — auto-set for SP M2M OAuth
#
# Only static / workspace-agnostic values belong below.

env:
  # mlflow.genai needs the Databricks SDK auth path; this flag lets MLflow
  # use the SP's M2M OAuth creds instead of trying to mint a legacy token.
  - name: MLFLOW_ENABLE_DB_SDK
    value: "1"
  - name: MLFLOW_TRACKING_URI
    value: "databricks"
  - name: MLFLOW_REGISTRY_URI
    value: "databricks-uc"

  # ── Workspace-specific values, sourced from DAB resource bindings ──────
  # Apps does NOT auto-expose resource bindings as env vars — each one must
  # be mapped here by `valueFrom: <resource-name>`. The resource names below
  # match those declared in resources/app.yml.
  - name: UC_CATALOG
    valueFrom: uc_catalog
  - name: UC_SCHEMA
    valueFrom: uc_schema
  - name: VOLUME_NAME
    valueFrom: volume_name
  - name: HF_TOKEN
    valueFrom: hf_token
  - name: HF_SECRET_SCOPE
    valueFrom: hf_secret_scope
  - name: HF_SECRET_KEY
    valueFrom: hf_secret_key
  - name: DATABRICKS_WAREHOUSE_ID
    valueFrom: sql_warehouse
  # The `postgres:` resource binding (resources/app.yml) auto-injects
  # PGHOST, PGDATABASE, PGUSER, PGPORT, PGSSLMODE — no valueFrom needed.
  # We do need the project name + branch for the ingest notebook's
  # runtime token mint — those aren't auto-exposed.
  - name: LAKEBASE_INSTANCE
    valueFrom: lakebase_instance
  - name: LAKEBASE_BRANCH
    valueFrom: lakebase_branch
  # Default prompt seeded into the Playground (the GEPA winner from our experiments)
  - name: DEFAULT_PROMPT
    value: |
      Identify the surgical instrument by its visible visual features:

      PROBE vs SHAVER (most common confusion):
      - probe = thin, narrow solid metal rod, uniform diameter end-to-end, tip may have a tiny hook or blunt end; NO opening, NO rotating head
      - shaver = wider hollow tube with a distinct rectangular or oval side-opening (aspiration window) near the tip; shaft is noticeably thicker than a probe

      Other instruments:
      - burr = round/spherical or oval abrasive head at tip
      - grasper or biter = two metal jaws that open/close at a hinge
      - anchor_driver = ribbed or screw-threaded shaft
      - electrocautery = smooth wand with flat, angled, or hook-shaped distal tip
      - cannula = transparent or yellow plastic hollow tube

      Vocabulary: probe, shaver, burr, grasper, biter, suture_passer, anchor_driver, electrocautery, cannula, scissors, drill_guide, trocar, knot_pusher, rasp, other_metal_tool, no_instrument_visible.
      Respond with strict JSON: {"instruments": [{"class": "<one of vocab>", "confidence": 0.0-1.0, "evidence": "<short text>"}], "anatomy": "<short text>", "tissue_condition": "<short text>"}
