resources:
  # Workbench-managed secret scope holding the catalog/schema/volume names
  # the App's runtime reads. Created by the bundle; values are written by
  # deploy.sh before `bundle deploy` runs (since secret values can't be set
  # via DAB resources).
  secret_scopes:
    workbench_config_scope:
      name: ${var.workbench_secret_scope}
      permissions:
        - level: MANAGE
          group_name: ${var.default_admin_group}
