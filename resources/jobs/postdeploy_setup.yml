resources:
  jobs:
    # One-shot setup job: runs after a fresh bundle deploy to wire up
    # everything the App SP needs but DAB can't express directly:
    #   - GRANT USE CATALOG/SCHEMA + CREATE TABLE/MODEL/FUNCTION + MODIFY/SELECT/EXECUTE
    #     on the workbench schema to the App SP
    #   - Create the Postgres role in Lakebase for the App SP
    #   - Grant READ on the HF token secret scope to the App SP
    #   - Sanity-ping every notebook the App references so we know they imported cleanly
    vlmwb_postdeploy_setup:
      name: vlmwb_postdeploy_setup
      tasks:
        - task_key: setup
          notebook_task:
            notebook_path: ../../setup/postdeploy.py
            source: WORKSPACE
            base_parameters:
              # Reference the resolved resource names so dev-mode prefixes are
              # respected (DAB prepends `dev_<user>_` to schemas + volumes in
              # `mode: development`). Using `${var.uc_schema}` directly here
              # would pass the un-prefixed name and the postdeploy GRANTs would
              # error with `SCHEMA_DOES_NOT_EXIST`.
              uc_catalog: ${resources.schemas.workbench_schema.catalog_name}
              uc_schema: ${resources.schemas.workbench_schema.name}
              volume_name: ${resources.volumes.medical_video.name}
              app_name: ${resources.apps.vlm_workbench_app.name}
              lakebase_instance: ${var.lakebase_instance}
              lakebase_database: ${var.lakebase_database}
              workbench_secret_scope: ${resources.secret_scopes.workbench_config_scope.name}
              hf_secret_scope: ${var.hf_secret_scope}
              hf_secret_key: ${var.hf_secret_key}
          environment_key: cpu_env
      queue:
        enabled: true
      environments:
        - environment_key: cpu_env
          spec:
            environment_version: "5"
      tags: ${var.common_resource_tags}
